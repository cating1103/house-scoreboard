<!DOCTYPE html>
<html>
<head>
  <title>House Scoreboard</title>
</head>

<body style="font-family:sans-serif; background:#0f172a; color:white;">
  <h1>🏆 Finance House Scoreboard</h1>

  <div id="leaderboard"></div>

  <script>
    fetch('data.json')
      .then(res => res.json())
      .then(data => {
        const list = data.houses.sort((a,b)=>b.score-a.score);

        let html = "<ol>";
        list.forEach(h => {
          html += `<li>${h.name} — ${h.score} pts</li>`;
        });
        html += "</ol>";

        document.getElementById("leaderboard").innerHTML = html;
      });
  </script>
</body>
</html>
